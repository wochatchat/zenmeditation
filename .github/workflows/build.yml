name: Android CI

on:
  workflow_dispatch:
    inputs:
      buildType:
        description: 'Build Type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_TYPE_INPUT: "${{ github.event.inputs.buildType }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate clean Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.9

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Accept Android SDK Licenses
        run: |
          # Try to accept licenses via sdkmanager
          if [ -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "Accepting licenses using latest sdkmanager..."
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          else
            echo "Accepting licenses using default sdkmanager on PATH..."
            yes | sdkmanager --licenses || true
          fi

      - name: Restore Keystore, local.properties and Environment Files
        run: |
          # Recreate local.properties pointing to Android SDK
          echo "sdk.dir=${ANDROID_HOME:-/usr/local/lib/android/sdk}" > local.properties
          echo "Generated local.properties:"
          cat local.properties

          # If a base64 debug.keystore is provided, restore it
          if [ -f debug.keystore.base64 ]; then
            echo "Restoring debug.keystore from base64 representation..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "Generating a compliant, self-signed debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          
          # Ensure .env exists so the secrets-gradle-plugin doesn't complain
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              echo "Copying .env.example to .env..."
              cp .env.example .env
            else
              echo "Creating empty .env file..."
              touch .env
            fi
          fi

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Build Android App
        env:
          KEYSTORE_BASE64: "${{ secrets.KEYSTORE_BASE64 }}"
          KEY_ALIAS: "${{ secrets.KEY_ALIAS }}"
          KEYSTORE_PWD: "${{ secrets.KEYSTORE_PWD }}"
          KEY_PWD: "${{ secrets.KEY_PWD }}"
        run: |
          BUILD_TYPE="debug"
          if [ ! -z "$BUILD_TYPE_INPUT" ]; then
            BUILD_TYPE="$BUILD_TYPE_INPUT"
          fi
          echo "Target build type: $BUILD_TYPE"
          
          VERSION_CODE="${{ github.run_number }}"
          VERSION_NAME="v1.0.${{ github.run_number }}"
          echo "Injecting Version Code: $VERSION_CODE"
          echo "Injecting Version Name: $VERSION_NAME"
          
          # Update version in app/build.gradle.kts right before compilation to guarantee the binary is stamped
          if [ -f app/build.gradle.kts ]; then
            sed -i "s/versionCode\s*=\s*[0-9]*/versionCode = $VERSION_CODE/g" app/build.gradle.kts
            sed -i "s/versionName\s*=\s*\"[^\"]*\"/versionName = \"$VERSION_NAME\"/g" app/build.gradle.kts
            sed -i "s/versionName\s*=\s*'[^']*'/versionName = \"$VERSION_NAME\"/g" app/build.gradle.kts
          fi

          ACTUAL_KEYSTORE_BASE64="$KEYSTORE_BASE64"
          if [ -z "$ACTUAL_KEYSTORE_BASE64" ]; then
            ACTUAL_KEYSTORE_BASE64=""
          fi
          if [[ "$ACTUAL_KEYSTORE_BASE64" == "{{"* ]]; then
            ACTUAL_KEYSTORE_BASE64=""
          fi

          ACTUAL_KEY_ALIAS="$KEY_ALIAS"
          if [ -z "$ACTUAL_KEY_ALIAS" ]; then
            ACTUAL_KEY_ALIAS="releasekey"
          fi
          if [[ "$ACTUAL_KEY_ALIAS" == "{{"* ]]; then
            ACTUAL_KEY_ALIAS="releasekey"
          fi

          ACTUAL_KEYSTORE_PWD="$KEYSTORE_PWD"
          if [ -z "$ACTUAL_KEYSTORE_PWD" ]; then
            ACTUAL_KEYSTORE_PWD="android"
          fi
          if [[ "$ACTUAL_KEYSTORE_PWD" == "{{"* ]]; then
            ACTUAL_KEYSTORE_PWD="android"
          fi

          ACTUAL_KEY_PWD="$KEY_PWD"
          if [ -z "$ACTUAL_KEY_PWD" ]; then
            ACTUAL_KEY_PWD="android"
          fi
          if [[ "$ACTUAL_KEY_PWD" == "{{"* ]]; then
            ACTUAL_KEY_PWD="android"
          fi

          if [ "$BUILD_TYPE" = "release" ]; then
            if [ ! -z "$ACTUAL_KEYSTORE_BASE64" ]; then
              echo "Setting up release keystore from active configuration..."
              echo "$ACTUAL_KEYSTORE_BASE64" | base64 -d > release.keystore
              echo "Compiling and signing release APK..."
              ./gradlew assembleRelease --no-configuration-cache --stacktrace -x test \
                -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
                -Pandroid.injected.signing.store.password="$ACTUAL_KEYSTORE_PWD" \
                -Pandroid.injected.signing.key.alias="$ACTUAL_KEY_ALIAS" \
                -Pandroid.injected.signing.key.password="$ACTUAL_KEY_PWD" \
                -Pandroid.injected.version.code="$VERSION_CODE" \
                -Pandroid.injected.version.name="$VERSION_NAME"
            else
              if [ -f my-upload-key.jks ]; then
                echo "Release requested but no secrets provided. Found stable committed my-upload-key.jks, using it for release signing..."
                ./gradlew assembleRelease --no-configuration-cache --stacktrace -x test \
                  -Pandroid.injected.signing.store.file=$(pwd)/my-upload-key.jks \
                  -Pandroid.injected.signing.store.password="android" \
                  -Pandroid.injected.signing.key.alias="upload" \
                  -Pandroid.injected.signing.key.password="android" \
                  -Pandroid.injected.version.code="$VERSION_CODE" \
                  -Pandroid.injected.version.name="$VERSION_NAME"
              else
                echo "Release requested but no keystore base64 secret and no committed my-upload-key.jks. Falling back to self-signed release..."
                keytool -genkey -v -keystore release.keystore -storepass android -alias releasekey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Release,O=Android,C=US"
                ./gradlew assembleRelease --no-configuration-cache --stacktrace -x test \
                  -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
                  -Pandroid.injected.signing.store.password="android" \
                  -Pandroid.injected.signing.key.alias="releasekey" \
                  -Pandroid.injected.signing.key.password="android" \
                  -Pandroid.injected.version.code="$VERSION_CODE" \
                  -Pandroid.injected.version.name="$VERSION_NAME"
              fi
            fi
          else
            echo "Compiling standard debug APK..."
            ./gradlew assembleDebug --no-configuration-cache --stacktrace -x test \
              -Pandroid.injected.version.code="$VERSION_CODE" \
              -Pandroid.injected.version.name="$VERSION_NAME"
          fi

      - name: Package and Rename Artifacts
        run: |
          mkdir -p build-artifacts
          BUILD_TYPE="debug"
          if [ ! -z "$BUILD_TYPE_INPUT" ]; then
            BUILD_TYPE="$BUILD_TYPE_INPUT"
          fi
          
          VERSION_NAME="v1.0.${{ github.run_number }}"
          
          if [ "$BUILD_TYPE" = "release" ]; then
            if [ -f app/build/outputs/apk/release/app-release.apk ]; then
              cp app/build/outputs/apk/release/app-release.apk build-artifacts/app-release-${VERSION_NAME}.apk
            elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
              cp app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/app-release-unsigned-${VERSION_NAME}.apk
            fi
            echo "ARTIFACT_NAME=release-apk-${VERSION_NAME}" >> $GITHUB_ENV
          else
            if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
              cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/app-debug-${VERSION_NAME}.apk
            fi
            echo "ARTIFACT_NAME=debug-apk-${VERSION_NAME}" >> $GITHUB_ENV
          fi

      - name: Commit and Push Release APK to Repository
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          BUILD_TYPE="debug"
          if [ ! -z "$BUILD_TYPE_INPUT" ]; then
            BUILD_TYPE="$BUILD_TYPE_INPUT"
          fi
          
          if [ "$BUILD_TYPE" = "release" ]; then
            VERSION_NAME="v1.0.${{ github.run_number }}"
            VERSION_CODE="${{ github.run_number }}"
            
            # Create release directory
            RELEASE_DIR="release/${VERSION_NAME}"
            mkdir -p "${RELEASE_DIR}"
            
            # Copy APK
            APK_DEST="${RELEASE_DIR}/app-release-${VERSION_NAME}.apk"
            if [ -f app/build/outputs/apk/release/app-release.apk ]; then
              cp app/build/outputs/apk/release/app-release.apk "${APK_DEST}"
            elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
              cp app/build/outputs/apk/release/app-release-unsigned.apk "${APK_DEST}"
            fi
            
            # Generate release/version.json
            mkdir -p release
            cat <<EOF > release/version.json
            {
              "versionCode": ${VERSION_CODE},
              "versionName": "${VERSION_NAME}",
              "releaseDate": "\$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
              "apkUrl": "https://raw.githubusercontent.com/${{ github.repository }}/main/${APK_DEST}",
              "releaseNotes": "A brand new production-ready release of your application. Enjoy enhanced stability, modern styling, and optimized package footprint.",
              "features": [
                "Production release signed and fully optimized",
                "Built with Android CI pipeline using modern Gradle toolchain",
                "Edge-to-edge screens enabled with Jetpack Compose styling",
                "Stable performance with local storage databases and components"
              ]
            }
            EOF
            
            # Commit and push
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add release/
            git commit -m "chore(release): publish release ${VERSION_NAME} with signed APK" || true
            
            # Pull first to avoid conflicts, then push
            CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
            git pull --rebase origin "${CURRENT_BRANCH}" || true
            git push origin HEAD:"${CURRENT_BRANCH}" || true
          fi

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: build-artifacts/